name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sensei
          POSTGRES_PASSWORD: sensei
          POSTGRES_DB: sensei
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sensei -d sensei"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_URL: http://localhost:3000
      APP_DEFAULT_LOCALE: es
      AUTH_SECRET: ci-auth-secret-change-in-real-env
      AUTH_TRUST_HOST: true
      DATABASE_URL: postgresql://sensei:sensei@localhost:5432/sensei
      LOG_LEVEL: info
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level low

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Run unit tests
        run: pnpm test

      - name: Check migrations
        run: pnpm exec drizzle-kit check

      - name: Build
        run: pnpm build

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
